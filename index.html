<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
    <title>PulseBoard | Your Personalized Feed</title>
    <meta name="description" content="Your personalized dashboard for trending news, videos, and topics across the web." />
    
    <!-- PWA Meta Tags -->
    <link rel="icon" type="image/svg+xml" href="/pulseboard-logo.svg" />
    <link rel="shortcut icon" href="/pulseboard-logo.svg" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#0b1117" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="apple-touch-icon" href="/pulseboard-logo.svg" />
    
    <!-- OpenGraph / Social Meta Tags -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="PulseBoard | Your Personalized Feed" />
    <meta property="og:description" content="Your personalized dashboard for trending news, videos, and topics across the web." />
    <meta property="og:image" content="/pulseboard-logo.svg" />
    
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="PulseBoard | Your Personalized Feed" />
    <meta name="twitter:description" content="Your personalized dashboard for trending news, videos, and topics across the web." />
    <meta name="twitter:image" content="/pulseboard-logo.svg" />
    <script>
      (function() {
        var s = localStorage.getItem('pulseboard-theme');
        var d = s === 'dark' || (!s && window.matchMedia('(prefers-color-scheme: dark)').matches);
        if (d) document.documentElement.classList.add('dark');
        var m = document.querySelector('meta[name=\"theme-color\"]');
        if (m) m.setAttribute('content', d ? '#0b1117' : '#f5f7fa');
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
